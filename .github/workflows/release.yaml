name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update module.json fields
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq \
            --arg version "$VERSION" \
            --arg url "https://github.com/${{ github.repository }}" \
            --arg manifest "https://github.com/${{ github.repository }}/releases/latest/download/module.json" \
            --arg download "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip" \
            '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
            module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Create module.zip
        run: zip -r module.zip . --exclude ".git/*" --exclude ".github/*" --exclude "node_modules/*" --exclude "src/*" --exclude "package*.json"

      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "module.json,module.zip"
          tag: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
